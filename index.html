<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Inventory Tracker</h1>
      <p class="timezone-label">Pacific Time</p>
      <time id="pacific-time" datetime=""></time>
    </header>

    <section class="summary">
      <article class="card">
        <h2>Total Leftover</h2>
        <p class="card-value" id="total-leftover">0</p>
        <p class="card-sub">units across all items</p>
      </article>
      <article class="card">
        <h2>Leftover Value</h2>
        <p class="card-value" id="leftover-value">$0.00</p>
        <p class="card-sub">total inventory worth</p>
      </article>
    </section>

    <section class="add-panel">
      <h2>Add Item</h2>
      <form id="add-form">
        <label>
          Name
          <input type="text" id="item-name" placeholder="e.g. Widget" required>
        </label>
        <label>
          Quantity
          <input type="number" id="item-quantity" min="1" step="1" value="1" required>
        </label>
        <label>
          Price
          <input type="number" id="item-price" min="0" step="0.01" placeholder="0.00" required>
        </label>
        <button type="submit">Add Item</button>
      </form>
    </section>

    <section class="list-panel">
      <h2>Items</h2>
      <ul id="item-list" class="item-list"></ul>
      <p id="empty-state" class="empty-state">No items yet. Add one above.</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
